name: Release APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'design/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    environment: Release
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode and verify release keystore
        env:
          # Inject as env vars so the shell never re-interprets special chars in the password
          # (a $, backtick or \ in an inlined ${{ secrets.* }} would otherwise be mangled).
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ vars.RELEASE_KEY_ALIAS }}   # alias is not secret -> stored as a variable
        run: |
          printf '%s' "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          size=$(wc -c < "$RUNNER_TEMP/release.keystore")
          echo "Decoded keystore size: ${size} bytes (a real keystore is typically ~2000-3000)"
          # Show keytool's actual message so failures are diagnosable:
          #  - "Invalid keystore format" / "Tag number..." => RELEASE_KEYSTORE_BASE64 is incomplete/garbled
          #  - "keystore password was incorrect"           => RELEASE_KEYSTORE_PASSWORD is wrong
          if ! keytool -list -keystore "$RUNNER_TEMP/release.keystore" -storepass "$KEYSTORE_PASSWORD"; then
            echo "::error::keytool could not open the keystore — see its message above."
            exit 1
          fi
          if [ -z "$KEY_ALIAS" ]; then
            echo "::error::RELEASE_KEY_ALIAS is empty or unset — set it (in the Release environment) to one of the aliases listed above."
            exit 1
          fi
          if ! keytool -list -keystore "$RUNNER_TEMP/release.keystore" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" > /dev/null; then
            echo "::error::Alias '$KEY_ALIAS' was not found in the keystore (see the alias list above). Fix RELEASE_KEY_ALIAS."
            exit 1
          fi

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ vars.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Name the artifact
        id: name
        run: echo "apk=skytte-1.0-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Write Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"

      - name: Distribute to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
          FIREBASE_GROUPS: ${{ vars.FIREBASE_GROUPS }}
          APK: app/build/outputs/apk/release/app-release.apk
        run: |
          if [ -z "$FIREBASE_APP_ID" ]; then
            echo "::error::FIREBASE_APP_ID is empty — set it as a variable in the Release environment."
            exit 1
          fi
          npm install -g firebase-tools
          firebase appdistribution:distribute "$APK" \
            --app "$FIREBASE_APP_ID" \
            --groups "$FIREBASE_GROUPS" \
            --release-notes "Skytte ${{ steps.name.outputs.apk }} (${GITHUB_SHA::7})"
