name: Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode and verify release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"
          keytool -list -keystore "$RUNNER_TEMP/release.keystore" \
            -storepass "${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" > /dev/null \
            || { echo "::error::Keystore could not be opened. Check that RELEASE_KEYSTORE_BASE64 is the complete, single-line base64 of the keystore and that RELEASE_KEYSTORE_PASSWORD is correct."; exit 1; }

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Name the artifact
        id: name
        run: echo "apk=skytte-1.0-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Write service-account key
        run: printf '%s' '${{ secrets.GDRIVE_SA_KEY }}' > "$RUNNER_TEMP/sa.json"

      - name: Upload to Google Drive
        env:
          GDRIVE_SA_KEY_FILE: ${{ runner.temp }}/sa.json
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          APK_PATH: app/build/outputs/apk/release/app-release.apk
          DRIVE_FILENAME: ${{ steps.name.outputs.apk }}
        run: |
          python3 -m pip install --quiet google-api-python-client google-auth
          python3 .github/scripts/upload_to_drive.py
